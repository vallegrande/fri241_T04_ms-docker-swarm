version: "3.8"

services:
  ms-student:
    image: ms-student:1.0
    build: .
    ports:
      - "8083:8080"
    environment:
      - DATABASE_URL=r2dbc:postgresql://ep-withered-shape-anlsd669-pooler.c-6.us-east-1.aws.neon.tech/duban_salas_35?sslmode=require&channel_binding=require
      - DATABASE_USERNAME=neondb_owner
      - DATABASE_PASSWORD=npg_mWdQ7hoGT3UF
    networks:
      - ms-net
    depends_on:
      - db
      - db-replica
    restart: always
    deploy:
      restart_policy:
        condition: on-failure

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=student_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
      - POSTGRES_REPLICATION_USER=replicator
      - POSTGRES_REPLICATION_PASSWORD=replicator_secret
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh
    networks:
      - ms-net
    restart: always

  db-replica:
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=student_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
      - PGUSER=replicator
      - PGPASSWORD=replicator_secret
      - PRIMARY_HOST=db
    volumes:
      - db-replica-data:/var/lib/postgresql/data
      - ./init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh
    networks:
      - ms-net
    depends_on:
      - db
    restart: always

  frontend:
    image: ms-frontend:1.0
    build: ./frontend
    ports:
      - "3000:80"
    networks:
      - ms-net
    depends_on:
      - ms-student
    restart: always

networks:
  ms-net:
    driver: overlay

volumes:
  db-data:
  db-replica-data:
