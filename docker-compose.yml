services:
  ms-student:
    image: ms-student:1.0
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=r2dbc:postgresql://db:5432/student_db
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=secret
    networks:
      - ms-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/api/student/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=student_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh
    networks:
      - ms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d student_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 2
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.1"
          memory: 512M

  db-replica:
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=student_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
      - PGUSER=replicator
      - PGPASSWORD=replicator_secret
      - PRIMARY_HOST=db
    volumes:
      - db-replica-data:/var/lib/postgresql/data
      - ./init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh
    networks:
      - ms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d student_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 2
      resources:
        limits:
          cpus: "0.1"
          memory: 512M

  frontend:
    image: ms-frontend:1.0
    ports:
      - "3000:80"
    networks:
      - ms-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 40s
        max_attempts: 2

networks:
  ms-net:
    driver: overlay
    attachable: true

volumes:
  db-data:
  db-replica-data: